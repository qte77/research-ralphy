name: Ralphy Weekly Run
on:
  schedule:
    - cron: '0 12 * * 3'  # Wednesday 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Update ralph submodule
        run: |
          git submodule update --remote ralph
          git add ralph
          git diff --staged --quiet || git commit -m "chore: update ralph submodule"

      - name: Generate PRD from feeds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat config/prd-generation-prompt.md)" \
            --max-turns 15 --output-format json

      - name: Run Ralph Loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          source config/compound.env
          make ralph_run ITERATIONS=25

      - name: Create PR with results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="evolve/$(date +%Y-%m-%d)"
          git checkout -b "$branch"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "feat: weekly self-evolution run $(date +%Y-%m-%d)"
          git push origin "$branch"
          gh pr create --title "Weekly evolution $(date +%Y-%m-%d)" \
            --body "Auto-generated by research-ralphy weekly run"
